<div class="container mt-4">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <h3 class="m-0">Your Tasks</h3>
  </div>

  <div class="row g-3">
    <!-- LEFT: Tasks -->
    <div class="col-12 col-lg-5">
      <div class="card shadow-sm">
        <div
          class="card-header d-flex justify-content-between align-items-center"
        >
          <span>Tasks</span>
          <button class="btn btn-info" (click)="toggleTaskAddition()">
            {{ isAddingTask ? "Cancel" : "Add New Task" }}
          </button>
          <span class="badge text-bg-secondary">{{ userTasks.length }}</span>
        </div>

        <div class="card-body">
          <!-- Add Task Form -->
          <form
            *ngIf="isAddingTask"
            #taskForm="ngForm"
            (ngSubmit)="addNewTask(taskForm)"
            class="border rounded p-3 mb-3"
          >
            <div class="mb-2">
              <label class="form-label">Task Name</label>
              <input
                ngModel
                type="text"
                class="form-control"
                name="name"
                required
                placeholder="Enter Task Name"
              />
            </div>

            <div class="mb-2">
              <label class="form-label">Category</label>
              <input
                ngModel
                type="text"
                class="form-control"
                name="category"
                required
                placeholder="Enter Task Category"
              />
            </div>

            <div class="row g-2">
              <div class="col-6">
                <label class="form-label">From</label>
                <input
                  ngModel
                  type="datetime-local"
                  class="form-control"
                  name="fromTime"
                  required
                />
              </div>
              <div class="col-6">
                <label class="form-label">To</label>
                <input
                  ngModel
                  type="datetime-local"
                  class="form-control"
                  name="toTime"
                  required
                />
              </div>
            </div>

            <div class="mt-3 d-flex gap-2">
              <button
                class="btn btn-primary"
                type="submit"
                [disabled]="!taskForm.valid || isSavingTask"
              >
                {{ isSavingTask ? "Saving..." : "Submit Task" }}
              </button>

              <button
                class="btn btn-outline-secondary"
                type="button"
                (click)="toggleTaskAddition()"
              >
                Close
              </button>
            </div>
          </form>

          <!-- Tasks list -->
          <div class="list-group">
            <button
              type="button"
              class="list-group-item list-group-item-action d-flex justify-content-between align-items-start"
              *ngFor="let task of userTasks; trackBy: trackTaskById"
              (click)="selectTask(task)"
              [class.active]="selectedTask?.id === task.id"
            >
              <div class="me-2">
                <div class="fw-semibold">{{ task.name }}</div>
                <div class="small opacity-75">{{ task.category }}</div>
                <div class="small opacity-75">
                  {{ task.fromTime }} → {{ task.toTime }}
                </div>
              </div>

              <div class="text-end">
                <span class="badge text-bg-light border">
                  {{ task?.subTasks?.length || 0 }} subtasks
                </span>

                <!-- placeholders for later -->
                <div class="mt-2 d-flex gap-2 justify-content-end">
                  <button
                    type="button"
                    class="btn btn-sm btn-outline-warning"
                    (click)="startEditTask(task); $event.stopPropagation()"
                    disabled
                    title="Under implementation"
                  >
                    Edit
                  </button>
                  <button
                    type="button"
                    class="btn btn-sm btn-outline-danger"
                    (click)="deleteTask(task); $event.stopPropagation()"
                  >
                    Delete
                  </button>
                </div>
              </div>
            </button>
          </div>

          <div *ngIf="!userTasks.length" class="text-muted mt-3">
            No tasks yet. Click “Add New Task”.
          </div>
        </div>
      </div>
    </div>

    <!-- RIGHT: Subtasks of selected task -->
    <div class="col-12 col-lg-7">
      <div class="card shadow-sm h-100">
        <div
          class="card-header d-flex justify-content-between align-items-center"
        >
          <span>
            Subtasks
            <span *ngIf="selectedTask" class="text-muted"
              >— {{ selectedTask.name }}</span
            >
          </span>
          <button
            (click)="toggleSubTaskAddition()"
            class="btn btn-success btn-sm"
            [disabled]="!selectedTask || userTasks.length == 0"
          >
            {{ isAddingSubTask ? "Cancel" : "Add New Subtask" }}
          </button>
          <!-- placeholder for later -->
        </div>

        <div class="card-body">
          <div *ngIf="!selectedTask" class="text-muted">
            Select a task on the left to view its subtasks.
          </div>

          <ng-container *ngIf="selectedTask">
            <form
              *ngIf="isAddingSubTask"
              #subTaskForm="ngForm"
              (ngSubmit)="addNewSubtask(subTaskForm)"
              class="border rounded p-3 mb-3"
            >
              <div class="mb-2">
                <label class="form-label">Task Name</label>
                <input
                  ngModel
                  type="text"
                  class="form-control"
                  name="name"
                  required
                  placeholder="Enter Task Name"
                />
              </div>

              <div class="row g-2">
                <div class="col-6">
                  <label class="form-label">From</label>
                  <input
                    ngModel
                    type="datetime-local"
                    class="form-control"
                    name="fromTime"
                    required
                  />
                </div>
                <div class="col-6">
                  <label class="form-label">To</label>
                  <input
                    ngModel
                    type="datetime-local"
                    class="form-control"
                    name="toTime"
                    required
                  />
                </div>
              </div>

              <div class="mt-3 d-flex gap-2">
                <button
                  class="btn btn-primary"
                  type="submit"
                  [disabled]="!subTaskForm.valid || isSavingTask"
                >
                  {{ isSavingTask ? "Saving..." : "Submit Sub Task" }}
                </button>

                <button
                  class="btn btn-outline-secondary"
                  type="button"
                  (click)="toggleSubTaskAddition()"
                >
                  Close
                </button>
              </div>
            </form>
            <div class="table-responsive">
              <table class="table align-middle">
                <thead>
                  <tr>
                    <th style="width: 45%">Name</th>
                    <th style="width: 35%">Time</th>
                    <th style="width: 10%">Done</th>
                    <th style="width: 10%" class="text-end">Actions</th>
                  </tr>
                </thead>

                <tbody>
                  <tr
                    *ngFor="
                      let st of selectedTask.subTasks;
                      trackBy: trackSubTaskById
                    "
                  >
                    <td class="fw-semibold">{{ st.name }}</td>
                    <td class="small text-muted">
                      {{ st.fromTime }} → {{ st.toTime }}
                    </td>
                    <td>
                      <input
                        class="form-check-input"
                        type="checkbox"
                        [checked]="st.done"
                        disabled
                      />
                    </td>
                    <td class="text-end">
                      <div class="btn-group btn-group-sm">
                        <button
                          class="btn btn-outline-warning"
                          disabled
                          title="Under implementation"
                        >
                          Edit
                        </button>
                        <button
                          (click)="deleteSubTask(st)"
                          class="btn btn-outline-danger"
                        >
                          Delete
                        </button>
                      </div>
                    </td>
                  </tr>

                  <tr *ngIf="!selectedTask?.subTasks?.length">
                    <td colspan="4" class="text-muted">
                      No subtasks for this task yet.
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </ng-container>
        </div>
      </div>
    </div>
  </div>
</div>
