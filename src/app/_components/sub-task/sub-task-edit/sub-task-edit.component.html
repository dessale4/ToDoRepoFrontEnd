<form
  #subTaskForm="ngForm"
  (ngSubmit)="onSubmit(subTaskForm)"
  class="border rounded p-3 mb-3"
>
  <div class="mb-2">
    <label class="form-label">Task Name</label>
    <input
      ngModel
      type="text"
      class="form-control"
      name="name"
      required
      [ngModel]="subTask?.name"
      placeholder="Enter Task Name"
    />
  </div>

  <div class="row g-2">
    <div class="col-6">
      <label class="form-label">From</label>
      <input
        ngModel
        type="datetime-local"
        class="form-control"
        name="fromTime"
        required
        [ngModel]="subTask?.fromTime"
      />
    </div>
    <div class="col-6">
      <label class="form-label">To</label>
      <input
        ngModel
        type="datetime-local"
        class="form-control"
        name="toTime"
        required
        [ngModel]="subTask?.toTime"
      />
    </div>
  </div>

  <div class="mt-3 d-flex gap-2">
    <button class="btn btn-primary" type="submit" [disabled]="!subTaskForm.valid || isSaving">
      {{ isSaving ? "Saving..." : (mode === "create" ? "Submit Sub Task" : "Save Changes") }}
    </button>

    <button class="btn btn-outline-secondary" type="button" (click)="cancel.emit()">
      Close
    </button>
  </div>
</form>
