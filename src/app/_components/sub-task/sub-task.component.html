<div class="card shadow-sm h-100">
  <div class="card-header d-flex justify-content-between align-items-center">
    <span>
      Subtasks
      <span *ngIf="selectedTask" class="text-muted">— {{ selectedTask.name }}</span>
    </span>

    <button
      class="btn btn-success btn-sm"
      (click)="toggleAdd()"
      [disabled]="!selectedTask"
    >
      {{ isAdding ? "Cancel" : "Add New Subtask" }}
    </button>
  </div>

  <div class="card-body">
    <div *ngIf="!selectedTask" class="text-muted">
      Select a task on the left to view its subtasks.
    </div>

    <ng-container *ngIf="selectedTask">
      <!-- Add -->
      <app-sub-task-edit
        *ngIf="isAdding"
        mode="create"
        [isSaving]="isSaving"
        (submitForm)="onSubmitNewSubTask($event)"
        (cancel)="toggleAdd()"
      ></app-sub-task-edit>

      <!-- Edit -->
      <app-sub-task-edit
        *ngIf="editing"
        mode="edit"
        [subTask]="editing"
        [isSaving]="isSaving"
        (submitForm)="onSubmitEdit($event)"
        (cancel)="cancelEdit()"
      ></app-sub-task-edit>

      <div class="table-responsive">
        <table class="table align-middle">
          <thead>
            <tr>
              <th style="width: 45%">Name</th>
              <th style="width: 35%">Time</th>
              <th style="width: 10%">Done</th>
              <th style="width: 10%" class="text-end">Actions</th>
            </tr>
          </thead>

          <tbody>
            <tr *ngFor="let st of selectedTask.subTasks; trackBy: trackSubTaskById">
              <td class="fw-semibold">{{ st.name }}</td>
              <td class="small text-muted">{{ st.fromTime }} → {{ st.toTime }}</td>

              <td>
                <input
                  class="form-check-input"
                  type="checkbox"
                  [checked]="st.done"
                  (change)="onToggleDone(st, $any($event.target).checked)"
                />
              </td>

              <td class="text-end">
                <div class="btn-group btn-group-sm">
                  <button class="btn btn-outline-warning" (click)="startEdit(st)" [disabled]="selectedTask.done || st.done">
                    Edit
                  </button>
                  <button class="btn btn-outline-danger" (click)="deleteSubTask.emit(st)">
                    Delete
                  </button>
                </div>
              </td>
            </tr>

            <tr *ngIf="!selectedTask?.subTasks?.length">
              <td colspan="4" class="text-muted">No subtasks for this task yet.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </ng-container>
  </div>
</div>
